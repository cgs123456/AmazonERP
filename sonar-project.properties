# SonarQube 分析配置
# 用法：sonar-scanner -Dsonar.host.url=http://your-sonar:9000 -Dsonar.login=xxx

sonar.projectKey=amazon-erp
sonar.projectName=Amazon ERP
sonar.projectVersion=1.0-SNAPSHOT

# 源码目录
sonar.sources=amz-common/src/main/java,amz-gateway/src/main/java,amz-service
sonar.exclusions=**/test/**,**/target/**

# Java 编译产物（必需，SonarQube 用以做符号解析）
sonar.java.binaries=**/target/classes
sonar.java.libraries=**/target/dependency/*.jar

# 测试目录
sonar.tests=**/src/test/java
sonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml

# 编码
sonar.sourceEncoding=UTF-8

# 多模块增强
sonar.modules=amz-common,amz-gateway,amz-service/amz-service-spapi,amz-service/amz-service-user,amz-service/amz-service-product,amz-service/amz-service-order,amz-service/amz-service-search,amz-service/amz-service-message,amz-service/amz-service-ai

# 忽略规则：Lombok 生成代码、Spring Boot 配置类
sonar.issue.ignore.multicriteria=lombokGenerated,springConfig
sonar.issue.ignore.multicriteria.lombokGenerated.ruleKey=java:S1186
sonar.issue.ignore.multicriteria.lombokGenerated.resourceKey=**/model/pojo/*.java
sonar.issue.ignore.multicriteria.springConfig.ruleKey=java:S1118
sonar.issue.ignore.multicriteria.springConfig.resourceKey=**/config/*.java
