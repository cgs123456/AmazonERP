server:
  port: 8104
spring:
  application:
    name: amz-service-multiplatform
  cloud:
    nacos:
      discovery:
        server-addr: 123.206.101.247:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://121.37.250.15:3306/amz_multiplatform?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_db_password}
  data:
    redis:
      host: 121.37.250.15
      port: 6379
      password: ${REDIS_PASSWORD:your_redis_password}
      database: 0
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
# 各平台 API 配置
platform:
  temu:
    app-key: ${TEMU_APP_KEY:}
    app-secret: ${TEMU_APP_SECRET:}
  tiktok:
    app-key: ${TIKTOK_APP_KEY:}
    app-secret: ${TIKTOK_APP_SECRET:}
  shein:
    app-key: ${SHEIN_APP_KEY:}
    app-secret: ${SHEIN_APP_SECRET:}
  # 汇率：币种代码 → CNY
  exchange-rates:
    USD: 7.25
    EUR: 7.85
    GBP: 9.20
    JPY: 0.045
