server:
  port: 8103
spring:
  application:
    name: amz-service-finance
  cloud:
    nacos:
      discovery:
        server-addr: 123.206.101.247:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://121.37.250.15:3306/amz_finance?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_db_password}
  data:
    redis:
      host: 121.37.250.15
      port: 6379
      password: ${REDIS_PASSWORD:your_redis_password}
      database: 0
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
# 金蝶云星空 API 配置
kingdee:
  api-gateway: https://api.kingdee.com
  app-id: ${KINGDEE_APP_ID:}
  app-secret: ${KINGDEE_APP_SECRET:}
  # 多币种汇率来源（固定参考汇率，生产应接 ECB/FED 汇率 API）
  exchange-rates:
    USD: 7.25
    EUR: 7.85
    GBP: 9.20
    JPY: 0.046
