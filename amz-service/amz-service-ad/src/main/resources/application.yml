spring:
  application:
    name: amz-service-ad
  cloud:
    nacos:
      discovery:
        server-addr: 123.206.101.247:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://121.37.250.15:3306/amz_ad?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
