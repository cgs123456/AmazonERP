version: '3.8'

services:
  # ==================== 基础设施 ====================

  # Nacos 服务注册与发现
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: amz-nacos
    environment:
      - MODE=standalone
      - JVM_XMS=256m
      - JVM_XMX=512m
      - PREFER_HOST_MODE=hostname
    ports:
      - "8848:8848"
      - "9848:9848"
    restart: unless-stopped

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: amz-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-root123}
      - TZ=Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/init-sql:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7.2
    container_name: amz-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: amz-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${MQ_USERNAME:-admin}
      - RABBITMQ_DEFAULT_PASS=${MQ_PASSWORD:-rabbitmq123}
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  # MongoDB
  mongodb:
    image: mongo:7.0
    container_name: amz-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME:-root}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-mongo123}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # Elasticsearch
  elasticsearch:
    image: elasticsearch:8.15.3
    container_name: amz-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  mongo-data:
  es-data:
